{% extends "base.html" %}

{% block title %}Company Interview Platform{% endblock %}

{% block content %}
<div class="home-container">
    <div class="home-content">
        <h1>AI Interview Evaluation Platform</h1>

        <p class="subtitle">
            Stateful technical interview system with structured evaluation,
            human feedback, and prompt version traceability.
        </p>

        <form action="/ui/interviews/start" method="post">
            <button type="submit" class="primary-btn">Take Interview</button>
        </form>

        <p class="login-link">
            <a href="/login">Company Login</a>
        </p>
    </div>
</div>
{% endblock %}
